name: Deploy to Render

on:
  # Se déclenche lors d'un push sur la branche 'main'
  push:
    branches:
      - main

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment
        run: |
          # Vous devez créer un "Deploy Hook" dans les paramètres de votre service sur Render
          # et l'ajouter comme secret (ex: RENDER_DEPLOY_HOOK_URL) dans les paramètres de votre repo GitHub.
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
